<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-K58GN22HKZ');</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;background:#0d0b1f;color:#eceaff;
    min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;

  .ic{font-size:72px}
  h1{font-size:34px;font-weight:900;margin:16px 0 10px}
  p{color:#a7a2d6;font-size:17px;line-height:1.7}
  .amt{color:#22d3ee;font-weight:900;font-size:20px;margin:6px 0 18px}
  .steps{text-align:left;background:#1b1740;border:1px solid #2c2752;border-radius:16px;padding:24px;margin:22px 0}
  .steps b{color:#fff}.steps li{margin:8px 0;color:#cdbcff}
  .btn{display:inline-block;background:linear-gradient(120deg,#7c5cff,#22d3ee);color:#fff;font-weight:800;

<div class="box">
  <div class="ic">🎉</div>
  <h1>報名成功，謝謝你！</h1>
  <div class="amt" id="amt"></div>
  <p>我已收到你的報名。接下來：</p>
  <div class="steps"><ul>
    <li><b>① 收 Email／LINE</b>：24 小時內會收到開課與選課方式（記得看垃圾信匣）。</li>

  </ul></div>
  <p style="font-size:14px">沒收到信？來信 <b style="color:#fff">bath@404table.com</b> 我幫你確認。</p>

</div>
<script>
  // 觸發 GA4 purchase（值由結帳連結帶入 ?v= ）
  (function(){
    var q=new URLSearchParams(location.search);
    var v=parseInt(q.get('v')||'0',10), m=q.get('m')||'course';
    if(v>0){
      document.getElementById('amt').textContent='NT$'+v.toLocaleString();
      try{ gtag('event','purchase',{
        transaction_id:'rpa-'+Date.now(), value:v, currency:'TWD',
        items:[{item_id:m,item_name:m,price:v,quantity:1}]
      }); }catch(e){}
    }
  })();
</script>

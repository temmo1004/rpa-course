<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#888;font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif}
  .card{width:1080px;height:1080px;position:relative;overflow:hidden;color:#fff}
  .bg{position:absolute;inset:0;background-size:cover;background-position:center}
  .scrim{position:absolute;inset:0;background:
    linear-gradient(180deg,rgba(10,8,26,.72) 0%,rgba(10,8,26,.15) 30%,rgba(10,8,26,.35) 55%,rgba(10,8,26,.92) 100%)}
  .in{position:absolute;inset:0;padding:78px;display:flex;flex-direction:column;height:100%}
  .brand{display:flex;align-items:center;gap:16px}
  .brand img{width:66px;height:66px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid rgba(255,255,255,.5)}
  .brand .nm{font-weight:800;font-size:30px}
  .brand .sp{font-size:21px;color:#d7d2f5;opacity:.85}
  .hook{margin-top:auto;font-size:72px;line-height:1.26;font-weight:900;letter-spacing:-1px;
    text-shadow:0 4px 30px rgba(0,0,0,.6)}
  .hook .hl{background:linear-gradient(120deg,#a78bff,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:34px;color:#e8e5ff;margin-top:24px;line-height:1.5;text-shadow:0 2px 14px rgba(0,0,0,.7);white-space:pre-line}
  .foot{margin-top:40px;display:flex;align-items:center;justify-content:space-between}
  .cta{background:linear-gradient(120deg,#7c5cff,#22d3ee);color:#fff;font-weight:900;font-size:36px;padding:24px 46px;border-radius:999px;box-shadow:0 14px 36px rgba(124,92,255,.5)}
  .tag{font-size:30px;color:#cfcaf0;font-weight:700;text-shadow:0 2px 14px rgba(0,0,0,.7)}
</style></head><body>

<div class="card" id="k1">
  <div class="bg" style="background-image:url('gpt/linebot.png')"></div><div class="scrim"></div>
  <div class="in">
    <div class="brand"><img src="../img/teacher.png"><div><div class="nm">巴斯・自動化實戰</div><div class="sp">贊助</div></div></div>
    <div class="hook">帶走一個會<br><span class="hl">自我進化</span>的<br>LINE 機器人。</div>
    <div class="sub">不是死腳本——它自動回覆，還越用越懂你。</div>
    <div class="foot"><div class="tag">90 分鐘做出來</div><div class="cta">990 體驗包 →</div></div>
  </div>
</div>

<div class="card" id="k2">
  <div class="bg" style="background-image:url('gpt/office.png')"></div><div class="scrim"></div>
  <div class="in">
    <div class="brand"><img src="../img/teacher.png"><div><div class="nm">巴斯・自動化實戰</div><div class="sp">贊助</div></div></div>
    <div class="hook">每天重複的事，<br>交給<span class="hl">機器人</span>。</div>
    <div class="sub">不會寫程式也能做。最快 90 分鐘跑出第一個。</div>
    <div class="foot"><div class="tag">零基礎友善</div><div class="cta">免費試做 →</div></div>
  </div>
</div>

<div class="card" id="k3">
  <div class="bg" style="background-image:url('gpt/linebot.png')"></div><div class="scrim"></div>
  <div class="in">
    <div class="brand"><img src="../img/teacher.png"><div><div class="nm">巴斯・自動化實戰</div><div class="sp">贊助</div></div></div>
    <div class="hook">我朋友手動回<br>LINE 到半夜。<br>現在<span class="hl">它自己回</span>。</div>
    <div class="sub">我教他用 AI 做了一個會進化的後台。</div>
    <div class="foot"><div class="tag">連除錯都錄給你</div><div class="cta">990 體驗包 →</div></div>
  </div>
</div>

<div class="card" id="k4">
  <div class="bg" style="background-image:url('gpt/office.png')"></div><div class="scrim"></div>
  <div class="in">
    <div class="brand"><img src="../img/teacher.png"><div><div class="nm">巴斯・自動化實戰</div><div class="sp">贊助</div></div></div>
    <div class="hook">不會寫程式，<br>也能讓 AI <span class="hl">幫你做事</span>。</div>
    <div class="sub">搶票、查價、發文、刷手遊——單門 NT$1,999。</div>
    <div class="foot"><div class="tag">原價 3,999</div><div class="cta">立即報名 →</div></div>
  </div>
</div>

</body></html>
